name: release

# Build per-architecture Linux binaries and a multi-arch container image,
# and publish them on a version tag (e.g. `git tag v1.0.0 && git push --tags`).
# `workflow_dispatch` runs the build for validation without publishing.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write   # create the GitHub Release + upload assets
  packages: write   # push the image to GHCR

env:
  IMAGE_NAME: ghcr.io/oyro-os/pylon

jobs:
  # ── Native binary build, one job per architecture ──────────────────────────
  binaries:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --bin pylon --target ${{ matrix.target }}

      - name: Package
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          name="pylon-${version}-${{ matrix.target }}"
          dist="dist/${name}"
          mkdir -p "${dist}"
          cp "target/${{ matrix.target }}/release/pylon" "${dist}/"
          strip "${dist}/pylon" || true
          cp LICENSE README.md apps.example.json "${dist}/"
          tar -C dist -czf "${name}.tar.gz" "${name}"
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          # Stage the raw binary (under its docker arch) for the image job.
          mkdir -p "bin/${{ matrix.arch }}"
          cp "target/${{ matrix.target }}/release/pylon" "bin/${{ matrix.arch }}/pylon"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: |
            pylon-*.tar.gz
            pylon-*.tar.gz.sha256
          if-no-files-found: error

      - name: Upload binary for image
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.arch }}
          path: bin
          if-no-files-found: error

  # ── Multi-arch container image from the prebuilt binaries ──────────────────
  image:
    name: docker image
    needs: binaries
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: dist
          merge-multiple: true

      - name: Restore exec bit
        run: chmod +x dist/amd64/pylon dist/arm64/pylon

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Publish the GitHub Release with the binary archives ────────────────────
  release:
    name: github release
    needs: [binaries, image]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
