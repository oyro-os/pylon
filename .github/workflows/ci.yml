name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-22.04
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      # Clustering/Redis-backed integration tests point at the service container.
      # Tests isolate themselves with random key prefixes.
      PYLON_TEST_REDIS_URL: redis://127.0.0.1:6379
    steps:
      - uses: actions/checkout@v4

      # Toolchain + rustfmt/clippy are pinned by rust-toolchain.toml; rustup
      # auto-installs it so CI matches local builds exactly.
      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      # Serial: the cross-node cluster tests share the single Redis service and
      # assert on short timing windows, so they must not run concurrently with
      # each other (they flake under parallel Redis contention otherwise).
      - name: Test
        run: cargo test --locked -- --test-threads=1
