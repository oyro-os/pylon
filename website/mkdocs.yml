site_name: Pylon
site_description: A self-hostable, Pusher-compatible realtime WebSocket server.
site_url: https://oyro-os.github.io/pylon/
repo_url: https://github.com/oyro-os/pylon
repo_name: oyro-os/pylon
edit_uri: edit/master/website/docs/
copyright: >-
  Pylon is an independent, clean-room implementation. "Pusher" is a trademark of
  its respective owner; Pylon is not affiliated with or endorsed by Pusher.

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - User Guide:
      - Introduction: user-guide/introduction.md
      - Installation: user-guide/installation.md
      - Quick Start: user-guide/quick-start.md
      - Configuration: user-guide/configuration.md
      - Applications & Authentication: user-guide/applications.md
