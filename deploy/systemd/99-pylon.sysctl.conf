# /etc/sysctl.d/99-pylon.sysctl.conf
# Kernel tuning for pylon — millions of idle WebSocket connections.
#
# Install:
#   cp 99-pylon.sysctl.conf /etc/sysctl.d/
#   sysctl --system
#
# These values mirror scripts/tune.sh in the pylon repository.
# Adjust for your specific hardware and connection targets.

# ── TCP socket buffer sizes ──────────────────────────────────────────────────
# Tiny min/default buffers for idle sockets; 16 KiB max is sufficient for
# pylon's low-bandwidth WebSocket frames.  Saves ~15 KiB RAM per connection
# vs. Linux defaults.
net.ipv4.tcp_rmem = 1024 4096 16384
net.ipv4.tcp_wmem = 1024 4096 16384
net.core.rmem_max = 16384
net.core.wmem_max = 16384

# TCP memory in pages (roughly 10 GB @ 4 KiB pages — tune to available RAM).
net.ipv4.tcp_mem = 10000000 10000000 10000000

# ── Accept queue / backlog ───────────────────────────────────────────────────
net.core.somaxconn = 65535
net.ipv4.tcp_max_syn_backlog = 65535
net.core.netdev_max_backlog = 10000

# ── Orphaned sockets ─────────────────────────────────────────────────────────
net.ipv4.tcp_max_orphans = 262144

# ── SO_REUSEPORT connection migration (Linux ≥ 5.14) ─────────────────────────
# Allows the kernel to migrate a SYN to a new listener when one of the
# SO_REUSEPORT sockets closes — keeps connections flowing during worker drain.
net.ipv4.tcp_migrate_req = 1

# ── File-descriptor limits ───────────────────────────────────────────────────
# System-wide maximum open files.
fs.file-max = 12000500
# Per-process maximum (must be ≥ LimitNOFILE in pylon.service).
fs.nr_open = 20000500
